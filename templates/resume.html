<!DOCTYPE html>
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{name}} — 个人简历</title>
    <style>
        /* --- 打印控制：强制 A4 纸，取消浏览器默认页边距 --- */
        @page {
            size: A4;
            margin: 0;
        }

        /* 全局设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.4;
            color: #333;
            background-color: #555;
            margin: 0;
            padding: 20px;
            font-size: 13.5px;
        }

        /* A4 纸张模拟 */
        .resume-container {
            width: 210mm;
            height: 296mm;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        @media print {
            body { background: #fff; padding: 0; }
            .resume-container { 
                box-shadow: none; 
                margin: 0; 
                width: 100%; 
                height: auto; 
                padding: 20px 25px;
            }
        }

        /* --- 头部区域 --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 0px;
            border-bottom: none;
            margin-bottom: 5px;
        }

        .header-info {
            flex: 1;
            padding-top: 5px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0 0 8px 0;
            line-height: 1;
        }

        .contact-info {
            font-size: 13px;
            color: #555;
            line-height: 1.35;
        }

        .contact-info span {
            margin-right: 15px;
        }

        /* 复制按钮交互样式 */
        .copy-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 6px;
            margin: 0 6px 2px 0;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
        }

        .copy-item:hover {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.12);
            transform: translateY(0);
        }

        .copy-item:active {
            transform: translateY(0);
        }

        .copy-item .copy-label {
            font-weight: 600;
        }

        .copy-item.copied {
            background: rgba(32, 201, 151, 0.12);
            border-color: rgba(32, 201, 151, 0.35);
        }

        .copy-toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(12px);
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(25, 25, 25, 0.92);
            color: #fff;
            font-size: 13px;
            line-height: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 9999;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 照片区域 */
        .photo-box {
            width: 90px;
            height: 112px;
            margin-left: 20px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            flex-shrink: 0;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 标题部分 */
        h2 {
            font-size: 16px;
            color: #2c6e9e;
            border-bottom: 2px solid #2c6e9e;
            padding-bottom: 3px;
            margin-top: 10px;
            margin-bottom: 8px;
        }

        h3 {
            font-size: 15px;
            margin: 6px 0 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-left {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 12px;
            font-weight: normal;
            background-color: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
            padding: 0 4px;
            border-radius: 2px;
            line-height: 16px;
            transform: scale(0.95);
        }

        .text-sub {
            font-weight: normal;
            font-size: 13px;
            color: #666;
        }

        .date {
            color: #666;
            font-weight: normal;
            font-size: 13px;
        }

        .project-desc {
            font-size: 13.5px;
            color: #555;
            margin-bottom: 4px;
            line-height: 1.4;
            text-align: justify;
        }

        .tech-stack-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0 6px 0;
            flex-wrap: wrap;
        }
        
        .tech-label {
            font-weight: bold;
            color: #2c6e9e;
            font-size: 13px;
        }

        .tech-tag {
            background-color: #e6f7ff;
            color: #007acc;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-family: Consolas, Monaco, monospace;
        }

        ul {
            padding-left: 18px;
            margin: 2px 0;
        }

        li {
            margin-bottom: 3px;
            color: #333;
            text-align: justify;
            font-size: 13.5px;
            line-height: 1.4;
        }

        .bold-key {
            font-weight: bold;
            color: #000;
        }

        a { text-decoration: none; color: inherit; }

        /* 仓库链接样式 */
        .repo-link {
            font-size: 12px;
            font-weight: normal;
            color: #666;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            border: 1px solid #ddd;
            padding: 1px 6px;
            border-radius: 4px;
            background-color: #fafafa;
            transition: all 0.2s;
        }

        .repo-link:hover {
            background-color: #f0f0f0;
            color: #2c6e9e;
            border-color: #2c6e9e;
        }

        /* h3 布局比例 */
        h3 .title-left { flex: 1.5; justify-content: flex-start; }
        h3 .text-sub { flex: 1; text-align: center; }
        h3 .date { flex: 1.2; text-align: right; }

    </style>
</head>
<body contenteditable="false">

        <!-- ==================== 专业技能 ==================== -->

    </div>

<!-- 复制交互功能 -->
<div id="copy-toast" class="copy-toast" aria-live="polite"></div>
<script>
(() => {
    const toast = document.getElementById('copy-toast');
    let toastTimer = null;

    function showToast(message) {
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 1400);
    }

    async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    document.querySelectorAll('.copy-item').forEach((item) => {
        item.addEventListener('click', async () => {
            const value = item.dataset.copy || '';
            const label = item.dataset.label || '内容';

            try {
                await copyText(value);
                item.classList.add('copied');
                showToast(`${label}已复制`);
                setTimeout(() => item.classList.remove('copied'), 800);
            } catch (err) {
                showToast(`${label}复制失败`);
            }
        });
    });
})();
</script>
</body></html>
